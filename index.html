<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebCAD Viewer</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app-shell">

<aside class="sidebar">

<h1>WebCAD Viewer</h1>

<p class="subtitle">Upload OBJ / STL / FBX files</p>

<label for="model-upload">Choose model</label>
<input id="model-upload" type="file" accept=".obj,.stl,.fbx">

<p id="loading-text">Loading model...</p>

<button id="view-model-btn" disabled>View Model</button>

<label class="toggle-row">
<input id="wireframe-toggle" type="checkbox">
<span>Wireframe mode</span>
</label>

<div class="stats-card">
<h2>Model Stats</h2>
<p>Triangles: <span id="triangle-count">0</span></p>
<p>Vertices: <span id="vertex-count">0</span></p>
</div>

</aside>

<main class="viewport">
<canvas id="viewer-canvas"></canvas>
</main>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
