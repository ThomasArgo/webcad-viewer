<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WebCAD Viewer</title>

<link rel="stylesheet" href="style.css">

<script type="importmap">
{
"imports": {
"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}
}
</script>

</head>

<body>

<div class="app-shell">

<aside class="sidebar">

<div class="bubble-layer"></div>

<h1>WebCAD Viewer</h1>

<p class="subtitle">Upload OBJ / STL / FBX files</p>

<label>Choose model</label>
<input id="model-upload" type="file" accept=".obj,.stl,.fbx">

<p id="loading-text">Loading model...</p>

<button id="view-model-btn" disabled>View Model</button>

<label class="toggle-row">
<input id="wireframe-toggle" type="checkbox">
<span>Wireframe Mode</span>
</label>

<label class="toggle-row">
<input id="texture-toggle" type="checkbox" checked>
<span>Show Texture</span>
</label>

<label class="toggle-row">
<input id="grid-toggle" type="checkbox" checked>
<span>Show Grid</span>
</label>

<label class="toggle-row">
<input id="auto-rotate" type="checkbox">
<span>Auto Rotate</span>
</label>

<div class="slider-row">

<span>Rotate Speed</span>

<input id="rotate-speed" type="range" min="0" max="0.05" step="0.001" value="0.01">

</div>

<button id="center-model">
Center Model
</button>

<button id="reset-model-rotation">
Reset Model Rotation
</button>

<button id="reset-view">
Reset Camera
</button>

<div class="stats-card">

<h2>Model Stats</h2>

<p>Triangles: <span id="triangle-count">0</span></p>
<p>Vertices: <span id="vertex-count">0</span></p>
<p>Meshes: <span id="mesh-count">0</span></p>

</div>

<div class="sidebar-footer">
© Thomas Argo 2026
</div>

</aside>

<main class="viewport">
<canvas id="viewer-canvas"></canvas>
</main>

</div>

  
<script type="module" src="script.js"></script>

</body>
</html>
